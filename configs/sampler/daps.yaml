# @package _global_
name: daps
sampler:
  _target_: genmol.samplers.DAPSSampler
  num_steps: ${daps.num_steps}
  beta: ${daps.beta}
  mh_steps: ${daps.mh_steps}
  max_mutations: ${daps.max_mutations}
  remask_max: ${daps.remask_max}
  remask_min: ${daps.remask_min}
  remask_schedule: ${daps.remask_schedule}
  ode_steps: ${daps.ode_steps}
  mutate_strategy: ${daps.mutate_strategy}
  proposal_mask_frac: ${daps.proposal_mask_frac}
  seed: ${seed}
  verbose: ${daps.verbose}

daps:
  num_steps: 50 #consider making this bigger
  beta: 100. #forward operator weight
  mh_steps: 2 #consider making this smaller
  max_mutations: 1
  remask_max: 0.6
  remask_min: 0.05
  remask_schedule: linear
  ode_steps: 100 #20 produces very poor quality generations #number of ODE steps for reverse diffusion
  mutate_strategy: fragment #"infill" (mask+model) or "fragment" (SAFE fragment mutation)
  proposal_mask_frac: 0.1 #fraction of tokens to remask for MH proposals (higher = more exploration, only for infill)
  verbose: false
